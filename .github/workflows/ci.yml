name: CI — CAD Design Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════
  # 1. VALIDATE KICAD SCHEMATICS
  # ═══════════════════════════════════════════════════
  validate-kicad:
    name: Validate KiCad Schematics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find all KiCad schematic files
        id: find_sch
        run: |
          FILES=$(find . -name "*.kicad_sch" -type f)
          echo "Found KiCad schematics:"
          echo "$FILES"
          COUNT=$(echo "$FILES" | grep -c . || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Validate KiCad S-expression syntax
        run: |
          ERRORS=0
          for f in $(find . -name "*.kicad_sch" -type f); do
            echo "Checking: $f"
            # Verify file starts with valid KiCad header
            if ! head -1 "$f" | grep -q "(kicad_sch"; then
              echo "  ERROR: Missing kicad_sch header"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            # Verify balanced parentheses (basic S-expr validation)
            OPEN=$(grep -o "(" "$f" | wc -l)
            CLOSE=$(grep -o ")" "$f" | wc -l)
            if [ "$OPEN" -ne "$CLOSE" ]; then
              echo "  ERROR: Unbalanced parentheses (open=$OPEN, close=$CLOSE)"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: valid S-expression ($OPEN pairs)"
            fi
            # Verify required fields
            if ! grep -q "title_block" "$f"; then
              echo "  WARNING: Missing title_block"
            fi
            if ! grep -q "uuid" "$f"; then
              echo "  ERROR: Missing UUID"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo ""
          echo "=== KiCad validation: $ERRORS errors ==="
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

      - name: Validate netlist files
        run: |
          ERRORS=0
          for f in $(find . -name "*.net" -type f); do
            echo "Checking netlist: $f"
            if ! head -5 "$f" | grep -qi "net\|netlist\|export"; then
              echo "  WARNING: May not be a valid netlist"
            fi
            COMPONENTS=$(grep -c "comp\|component" "$f" || echo 0)
            echo "  Components found: $COMPONENTS"
            if [ "$COMPONENTS" -lt 1 ]; then
              echo "  WARNING: No components found in netlist"
            fi
          done
          echo "Netlist check complete"

  # ═══════════════════════════════════════════════════
  # 2. VALIDATE BOMs
  # ═══════════════════════════════════════════════════
  validate-boms:
    name: Validate Bills of Materials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate BOM CSV files
        run: |
          ERRORS=0
          for f in $(find . -name "bom.csv" -type f); do
            echo "Checking BOM: $f"
            # Check file is valid CSV (at least has header + 1 data row)
            LINES=$(wc -l < "$f")
            if [ "$LINES" -lt 2 ]; then
              echo "  ERROR: BOM has fewer than 2 lines (need header + data)"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            # Check header has required columns
            HEADER=$(head -1 "$f")
            for col in Reference Description Qty; do
              if ! echo "$HEADER" | grep -qi "$col"; then
                echo "  WARNING: Missing column '$col' in header"
              fi
            done
            # Count components
            DATA_ROWS=$((LINES - 1))
            echo "  OK: $DATA_ROWS components listed"
            # Validate CSV structure (consistent column count)
            python3 -c "
          import csv, sys
          with open('$f') as csvfile:
              reader = csv.reader(csvfile)
              header = next(reader)
              cols = len(header)
              for i, row in enumerate(reader, 2):
                  if len(row) != cols:
                      print(f'  WARNING: Row {i} has {len(row)} columns (expected {cols})')
          print(f'  CSV structure: {cols} columns, valid')
          " || echo "  WARNING: CSV parsing issue"
          done
          echo ""
          echo "=== BOM validation: $ERRORS errors ==="
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

  # ═══════════════════════════════════════════════════
  # 3. VALIDATE PCB STACKUPS
  # ═══════════════════════════════════════════════════
  validate-stackups:
    name: Validate PCB Stackup Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PCB stackup files
        run: |
          for f in $(find . -name "pcb_stackup*" -name "*.txt" -type f); do
            echo "Checking stackup: $f"
            # Check for layer definitions
            LAYERS=$(grep -ci "layer\|signal\|plane\|prepreg\|core" "$f" || echo 0)
            echo "  Layer references: $LAYERS"
            # Check for thickness spec
            if grep -qi "thickness\|mm\|µm\|um" "$f"; then
              echo "  OK: thickness specifications found"
            else
              echo "  WARNING: No thickness specifications found"
            fi
            # Check for material spec
            if grep -qi "material\|FR-4\|panasonic\|rogers\|isola" "$f"; then
              echo "  OK: material specifications found"
            else
              echo "  WARNING: No material specifications found"
            fi
          done
          echo "Stackup validation complete"

  # ═══════════════════════════════════════════════════
  # 4. VALIDATE DOCUMENTATION
  # ═══════════════════════════════════════════════════
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check product datasheets exist
        run: |
          ERRORS=0
          PRODUCTS=(
            "eRadar360_CAD"
            "eHealth365_CAD_Design/smart_ring_pro"
            "eHealth365_CAD_Design/smart_patch_pro"
            "ePAM_CAD_Design/eco_car"
            "ePAM_CAD_Design/urban_drone"
            "ePAM_CAD_Design/space_shuttle"
            "ePAM_CAD_Design/combo_unit"
          )
          for product in "${PRODUCTS[@]}"; do
            if [ -f "$product/product_datasheet.md" ]; then
              echo "OK: $product/product_datasheet.md"
            else
              echo "ERROR: Missing $product/product_datasheet.md"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo ""
          echo "=== Datasheet check: $ERRORS missing ==="
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

      - name: Check product READMEs exist
        run: |
          for dir in eRadar360_CAD eHealth365_CAD_Design ePAM_CAD_Design; do
            if [ -f "$dir/README.md" ]; then
              echo "OK: $dir/README.md"
            else
              echo "WARNING: Missing $dir/README.md"
            fi
          done

      - name: Validate markdown files (no broken headers)
        run: |
          ERRORS=0
          for f in $(find . -name "*.md" -not -path "./.git/*" -type f); do
            # Check for valid UTF-8
            if ! file "$f" | grep -qi "text\|UTF-8\|ASCII"; then
              echo "ERROR: $f is not valid text"
              ERRORS=$((ERRORS + 1))
            fi
          done
          TOTAL=$(find . -name "*.md" -not -path "./.git/*" | wc -l)
          echo "Checked $TOTAL markdown files, $ERRORS errors"
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

  # ═══════════════════════════════════════════════════
  # 5. VALIDATE HTML SCHEMATICS
  # ═══════════════════════════════════════════════════
  validate-html:
    name: Validate HTML Schematics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML schematic files
        run: |
          ERRORS=0
          for f in $(find . -name "*.html" -type f); do
            echo "Checking HTML: $f"
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -lt 100 ]; then
              echo "  ERROR: File too small ($SIZE bytes) — likely corrupted"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            # Check for basic HTML structure
            if grep -q "<html\|<!DOCTYPE\|<title" "$f"; then
              echo "  OK: valid HTML structure ($SIZE bytes)"
            else
              echo "  WARNING: No standard HTML tags found ($SIZE bytes)"
            fi
          done
          echo ""
          echo "=== HTML validation: $ERRORS errors ==="

  # ═══════════════════════════════════════════════════
  # 6. VALIDATE CSV DATA FILES
  # ═══════════════════════════════════════════════════
  validate-csv:
    name: Validate CSV Data Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all CSV files
        run: |
          python3 << 'PYEOF'
          import csv
          import os
          import sys

          errors = 0
          total = 0

          for root, dirs, files in os.walk('.'):
              if '.git' in root:
                  continue
              for fname in files:
                  if not fname.endswith('.csv'):
                      continue
                  path = os.path.join(root, fname)
                  total += 1
                  try:
                      with open(path, 'r') as f:
                          reader = csv.reader(f)
                          header = next(reader)
                          rows = sum(1 for _ in reader)
                          print(f"OK: {path} — {len(header)} columns, {rows} data rows")
                  except Exception as e:
                      print(f"ERROR: {path} — {e}")
                      errors += 1

          print(f"\n=== CSV validation: {total} files, {errors} errors ===")
          if errors > 0:
              sys.exit(1)
          PYEOF

  # ═══════════════════════════════════════════════════
  # 7. FILE SIZE & STRUCTURE CHECK
  # ═══════════════════════════════════════════════════
  structure-check:
    name: Repository Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for large binary files
        run: |
          LARGE=$(find . -not -path "./.git/*" -type f -size +10M)
          if [ -n "$LARGE" ]; then
            echo "WARNING: Large files found (>10MB):"
            echo "$LARGE"
            echo "Consider using Git LFS for large binaries"
          else
            echo "OK: No files exceed 10MB"
          fi

      - name: Repository statistics
        run: |
          echo "=== Repository Statistics ==="
          echo ""
          PRODUCTS=$(find . -maxdepth 1 -type d -not -name ".git" -not -name "." -not -name ".github" | wc -l)
          echo "Product lines: $PRODUCTS"
          echo ""
          echo "File counts by type:"
          echo "  KiCad schematics: $(find . -name '*.kicad_sch' | wc -l)"
          echo "  Netlists:         $(find . -name '*.net' | wc -l)"
          echo "  BOMs (CSV):       $(find . -name 'bom.csv' | wc -l)"
          echo "  Pick-and-place:   $(find . -name 'pick_and_place.csv' | wc -l)"
          echo "  PCB stackups:     $(find . -name 'pcb_stackup*' -name '*.txt' | wc -l)"
          echo "  Datasheets:       $(find . -name 'product_datasheet.md' | wc -l)"
          echo "  HTML schematics:  $(find . -name '*.html' | wc -l)"
          echo "  Documentation:    $(find . -name '*.md' -not -path './.git/*' | wc -l)"
          echo "  All CSV data:     $(find . -name '*.csv' | wc -l)"
          echo ""
          TOTAL=$(find . -not -path "./.git/*" -type f | wc -l)
          echo "Total files: $TOTAL"

  # ═══════════════════════════════════════════════════
  # SUMMARY
  # ═══════════════════════════════════════════════════
  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-kicad, validate-boms, validate-stackups, validate-docs, validate-html, validate-csv, structure-check]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## CAD Design Validation Report"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| KiCad schematics | ${{ needs.validate-kicad.result }} |"
          echo "| Bills of Materials | ${{ needs.validate-boms.result }} |"
          echo "| PCB stackups | ${{ needs.validate-stackups.result }} |"
          echo "| Documentation | ${{ needs.validate-docs.result }} |"
          echo "| HTML schematics | ${{ needs.validate-html.result }} |"
          echo "| CSV data files | ${{ needs.validate-csv.result }} |"
          echo "| Repo structure | ${{ needs.structure-check.result }} |"
          if [ "${{ needs.validate-kicad.result }}" != "success" ] || \
             [ "${{ needs.validate-boms.result }}" != "success" ] || \
             [ "${{ needs.validate-docs.result }}" != "success" ]; then
            echo ""
            echo "VALIDATION FAILED"
            exit 1
          fi
          echo ""
          echo "All checks passed"
